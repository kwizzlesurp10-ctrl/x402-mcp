name: storefront monitor

# Availability and integrity check for the public storefront.
#
# This began life as a keep-warm ping: the free Render plan spun down after
# ~15 minutes idle, and a cold start dropped the in-memory registry so the
# purchase URL indexed in the CDP Bazaar catalog answered 404 instead of 402.
# The box is on an always-on plan now and there is nothing left to keep warm,
# but the alarm is worth keeping — it surfaced the outage on 2026-07-21, when a
# listing died silently and took two sales' records with it.
#
# What it watches, in order of how badly you want to know:
#   1. the service answers at all
#   2. EVERY paid endpoint can actually take an agent's payment (402 + a real
#      PAYMENT-REQUIRED header — a 402 with no header is a dead storefront that
#      still looks alive)
#   3. no /doctor check is failing (e.g. Redis set but unreachable, which
#      degrades silently and only costs you at the next restart)
#
# A failed run notifies you via GitHub. That IS the "you are not up and selling"
# alert — it fires whenever an agent that found a listing would get nothing.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BASE_URL: https://x402-mcp.onrender.com
      PRODUCT_ID: d22bbf5f3c4b4666a6f80980c7bc7c50
    steps:
      - name: Service responds
        run: |
          # --max-time 120: a deploy restart can still take a while to come up.
          code=$(curl -sS -o /tmp/health.json -w '%{http_code}' --max-time 120 "$BASE_URL/health")
          echo "health -> $code"
          cat /tmp/health.json
          test "$code" = "200"

      - name: Every paid endpoint can take an agent's payment
        run: |
          # "Up and selling" is more than 200 OK: each paid resource must return
          # 402 WITH a usable PAYMENT-REQUIRED header, or an agent that found it
          # cannot pay. X-Demand-Ignore keeps these probes out of demand counts.
          fail=0
          check() {
            name="$1"; url="$2"
            hdrs=$(curl -sS -D - -o /dev/null --max-time 120 \
              -H 'X-Demand-Ignore: storefront-monitor' "$url" || true)
            code=$(printf '%s' "$hdrs" | grep -iE '^HTTP/' | head -1 | awk '{print $2}')
            has_hdr=$(printf '%s' "$hdrs" | grep -ci '^payment-required:')
            echo "$name -> HTTP $code, PAYMENT-REQUIRED present: $has_hdr"
            if [ "$code" = "402" ] && [ "$has_hdr" -ge 1 ]; then
              echo "  OK: $name can take a payment."
            else
              echo "::error::$name is NOT sellable: HTTP $code, header present=$has_hdr (want 402 + header)."
              fail=1
            fi
          }
          check "pulse-listing" "$BASE_URL/swarm/products/$PRODUCT_ID/purchase"
          check "tx-decision"   "$BASE_URL/base/tx-decision?gas=usdc&urgency=flexible"
          check "mn-property"   "$BASE_URL/mn/property-check?address=1700+Penn+Ave+N"
          if [ "$fail" = "1" ]; then
            echo "::error::At least one paid endpoint cannot take an agent purchase."
            echo "::error::Agents that discovered these URLs are getting nothing. Check /doctor;"
            echo "::error::if the pinned listing 404s, do NOT POST /pulse/publish (a new id"
            echo "::error::abandons the cataloged URL) — with Redis healthy a restart restores it."
            exit 1
          fi

      - name: No failing doctor checks
        run: |
          code=$(curl -sS -o /tmp/doctor.json -w '%{http_code}' --max-time 120 "$BASE_URL/doctor")
          if [ "$code" != "200" ]; then
            echo "::error::/doctor returned $code"
            exit 1
          fi
          failures=$(python3 -c "
          import json
          checks = json.load(open('/tmp/doctor.json'))['checks']
          bad = [c for c in checks if c['status'] == 'fail']
          for c in bad:
              print(f\"::error::doctor {c['id']}: {c['message']}\")
          print(len(bad))
          " | tail -1)
          echo "failing checks: $failures"
          test "$failures" = "0"
