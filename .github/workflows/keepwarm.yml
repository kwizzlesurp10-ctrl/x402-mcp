name: keep storefront warm

# The public storefront runs on a Render free instance, which spins down after
# ~15 minutes of inactivity. Its filesystem is ephemeral, so a cold start drops
# the in-memory product registry and ledger/products.json — and the purchase URL
# indexed in the CDP Bazaar catalog starts answering 404 instead of 402.
#
# This pings often enough that the instance never idles out, and fails loudly
# (an Actions failure notification) if the listing has already gone missing.

on:
  schedule:
    # Every 5 minutes. GitHub delays scheduled runs under load, so this is
    # deliberately tighter than the ~15 minute spin-down window.
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BASE_URL: https://x402-mcp.onrender.com
      PRODUCT_ID: d22bbf5f3c4b4666a6f80980c7bc7c50
    steps:
      - name: Ping /health
        run: |
          # --max-time 120: a cold start can take well over a minute to boot.
          code=$(curl -sS -o /tmp/health.json -w '%{http_code}' --max-time 120 "$BASE_URL/health")
          echo "health -> $code"
          cat /tmp/health.json
          test "$code" = "200"

      - name: Assert the cataloged listing still resolves
        run: |
          url="$BASE_URL/swarm/products/$PRODUCT_ID/purchase"
          code=$(curl -sS -o /tmp/listing.json -w '%{http_code}' --max-time 120 "$url")
          echo "listing -> $code"
          if [ "$code" = "402" ]; then
            echo "OK: listing is alive and serving its payment challenge."
            exit 0
          fi
          cat /tmp/listing.json || true
          echo "::error::Listing $PRODUCT_ID returned $code (expected 402)."
          echo "::error::The instance most likely cold-started and lost its registry."
          echo "::error::Republish via POST /pulse/publish, then re-register the new URL."
          exit 1
