# Render Blueprint — SELLER-ONLY public x402 storefront (docs/DEPLOY-PLAN.md).
#
# SAFETY: this is a PUBLIC box. It carries X402_PAY_TO_ADDRESS + CDP creds ONLY.
# NEVER add EVM_PRIVATE_KEY / SVM_PRIVATE_KEY here — the spend key stays on the
# operator machine. /health must show wallet_configured:false post-deploy.
#
# Uses the root ./Dockerfile (honours Render's dynamic $PORT; copies only app
# code, no secrets baked). Free plan spins down after ~15min idle, so publish
# the listing and run the discoverable settle while the box is warm.
services:
  - type: web
    name: x402-mcp
    runtime: docker
    plan: free
    region: oregon
    envVars:
      # --- secrets: set in the Render dashboard, never synced from git ---
      - key: X402_PAY_TO_ADDRESS
        sync: false           # mainnet USDC receive wallet (consistent address)
      - key: CDP_API_KEY_ID
        sync: false
      - key: CDP_API_KEY_SECRET
        sync: false
      - key: OPERATOR_TOKEN
        sync: false           # protects /quota
      # --- mainnet revenue coherence (doctor FAILS a public testnet box) ---
      - key: CDP_NETWORKS
        value: "eip155:8453"
      - key: REVENUE_NETWORK
        value: "eip155:8453"
      - key: X402_DEFAULT_NETWORK
        value: "eip155:8453"
      - key: SWARM_SELL_NETWORK
        value: "eip155:8453"   # Pulse/composite LISTINGS build on mainnet (default is testnet)
      # --- Bazaar discoverability ---
      - key: BAZAAR_DISCOVERABLE
        value: "true"
      - key: BAZAAR_SERVICE_NAME
        value: "x402 MCP Storefront"
      - key: BAZAAR_SERVICE_TAGS
        value: "base,intelligence,x402,data"
      # --- listing durability on an ephemeral host ---
      # The free plan has no persistent disk: a restart or redeploy wipes
      # ledger/products.json, and the purchase URL indexed in the CDP Bazaar
      # catalog then 404s. Pinning the id makes startup republish a fresh Pulse
      # behind the SAME url, so cataloged buyers keep resolving. Do not change
      # this value — it is the id that is already in the catalog.
      - key: PINNED_PULSE_PRODUCT_ID
        value: "d22bbf5f3c4b4666a6f80980c7bc7c50"
      # --- seller-only posture ---
      - key: SWARM_ENABLED
        value: "false"        # no buyer role on a public box
      - key: DASHBOARD_ACTIONS
        value: "true"         # kept on as the manual escape hatch: if the boot-time
                              # republish fails (e.g. facilitator 401), POST
                              # /pulse/publish is the only way to restore a listing
                              # without a redeploy.
      - key: PUBLIC_BASE_URL
        value: "https://x402-mcp.onrender.com"  # VERIFY this matches the assigned URL
